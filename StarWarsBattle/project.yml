name: StarWarsBattle
options:
  bundleIdPrefix: com.starwarsbattle
  deploymentTarget:
    iOS: "16.0"

targets:
  StarWarsBattle:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    info:
      path: StarWarsBattle/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UIDeviceFamily: [2]
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    sources:
      - path: StarWarsBattle
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.starwarsbattle.StarWarsBattle
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "2"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    dependencies:
      - sdk: SpriteKit.framework

  StarWarsBattleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: StarWarsBattleTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.starwarsbattle.StarWarsBattleTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/StarWarsBattle.app/StarWarsBattle"
        TARGETED_DEVICE_FAMILY: "2"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    dependencies:
      - target: StarWarsBattle
